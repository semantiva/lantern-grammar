name: CI Pipeline

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  python_version: '3.11'

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}

      - name: Install lint and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate version source and first-release alignment
        run: |
          python scripts/check_version_alignment.py --require-package-model-equality

      - name: Run pylint
        run: |
          pylint --fail-under=7.5 src/lantern_grammar/

      - name: Run ruff
        run: |
          ruff check src/lantern_grammar/ tests/ scripts/ setup.py

      - name: Run mypy
        run: |
          mypy src/lantern_grammar/

      - name: Run black format check
        run: |
          black --check src/lantern_grammar/ tests/ scripts/ setup.py

      - name: Check license headers
        run: |
          python scripts/check_license_headers.py

  test:
    runs-on: ubuntu-latest
    needs: linting
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          coverage run -m pytest --maxfail=1 -q

      - name: Display coverage report
        run: |
          coverage report

  build:
    runs-on: ubuntu-latest
    needs:
      - linting
      - test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python_version }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[release]"

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION=$(python scripts/check_version_alignment.py --print-package-version)
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "❌ Tag ${GITHUB_REF_NAME} does not match package version v${PACKAGE_VERSION}"
            exit 1
          fi
          echo "✅ Tag matches package version v${PACKAGE_VERSION}"

      - name: Build package
        run: |
          python -m build

      - name: Validate built distributions
        run: |
          python -m twine check dist/*

      - name: Clean-environment install smoke and artifact generation
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python scripts/smoke_test_installed_package.py \
            --expected-package-version "$(python scripts/check_version_alignment.py --print-package-version)" \
            --expected-model-version "$(python scripts/check_version_alignment.py --print-model-version)"
          python scripts/generate_license_report.py --output artifacts/license-report.json
          deactivate
          python scripts/generate_sbom.py --python .venv-smoke/bin/python --output artifacts/sbom.cyclonedx.json

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
            artifacts/sbom.cyclonedx.json
            artifacts/license-report.json

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
